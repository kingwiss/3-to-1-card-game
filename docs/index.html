<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>1 to 3 | Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blue: #020617;
            --bg-gray: #475569;
            --primary: #3b82f6;
            --accent: #6366f1;
            --danger: #ef4444;
        }
        
        @keyframes gradient-wave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(-45deg, #334155, #64748b, #475569, #94a3b8, #334155);
            background-size: 400% 400%;
            animation: gradient-wave 15s ease infinite;
            color: #f8fafc;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        .animated-bg {
            background: linear-gradient(-45deg, #020617, #0f172a, #334155, #1e293b, #020617);
            background-size: 400% 400%;
            animation: gradient-wave 15s ease infinite;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 48px -12px rgba(0, 0, 0, 1);
            transform: translateZ(0);
        }
        
        .card-shadow {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.9);
        }

        @keyframes aura-pulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.15); opacity: 0.35; }
        }
        .aura {
            animation: aura-pulse 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .floating {
            animation: float 4s infinite ease-in-out;
        }

        @keyframes wave {
            0% { transform: translateX(0) translateZ(0) scaleY(1); }
            50% { transform: translateX(-25%) translateZ(0) scaleY(0.85); }
            100% { transform: translateX(-50%) translateZ(0) scaleY(1); }
        }
        .fluid-wave {
            animation: wave 3s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            width: 200%;
            transform-origin: center bottom;
        }

        .bubble-container {
            box-shadow: 
                inset 0 0 20px rgba(255, 255, 255, 0.3),
                inset 10px 0 40px rgba(255, 255, 255, 0.1),
                inset -10px 0 40px rgba(0, 0, 0, 0.4),
                0 10px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateZ(0);
        }

        .bubble-shine {
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 60%);
            border-radius: 50%;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: linear-gradient(to bottom, transparent, rgba(96, 165, 250, 0.3), transparent);
            position: absolute;
            top: -100%;
            left: 0;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: -100%; }
            100% { top: 200%; }
        }

        @keyframes draw-card-anim {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            30% {
                transform: translateY(-20px) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translateY(200px) scale(1);
                opacity: 0;
            }
        }
        .animate-draw-card {
            animation: draw-card-anim 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .deck-card-base {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-pattern {
            background-color: #0f172a;
            background-image:  radial-gradient(#3b82f6 1px, transparent 1px);
            background-size: 10px 10px;
            opacity: 0.1;
        }
    </style>
